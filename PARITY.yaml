# Intentional omissions the anti-rot checks should skip. Each needs a reason.
# Populated from Task 6 Step 1: Null* stubs not covered by a row's stub_service,
# and contrib dirs that are unimported-in-entries but load transitively / are internal.
ignore:
  - stub_service: NullExtensionService
    reason: >-
      Exported from services/extensions/common/extensions.ts as a ported VS Code
      type-contract class but never registered via registerSingleton anywhere in
      the tree — the real ExtensionService (services/extensions/browser/extensionService.ts)
      is the active IExtensionService. Unused dead code, not a functioning stub.
  - stub_service: NullRemoteAgentService
    reason: >-
      Instantiated directly in browser/web.main.ts as the active IRemoteAgentService
      and already documented in the 'remote' row's evidence/summary. Not added as a
      row signal because 'remote' is status partial: a partial row with a stub_service
      signal that exists always trips the "claims partial but stub still registered"
      check, which would be a false positive here (SSH/WSL/container work; only the
      remote extension host is missing).
  - stub_service: NullRemoteExtensionsScannerService
    reason: >-
      registerSingleton'd as the active IRemoteExtensionsScannerService — no remote
      extension host to scan extensions on. Same reasoning as NullRemoteAgentService:
      covered by the 'remote' row (status partial), can't be a tracked signal there
      without a false violation.
  - stub_service: NullWorkbenchAssignmentService
    reason: >-
      Internal A/B-testing / feature-flag assignment service (services/assignment),
      registered as the active no-op IWorkbenchAssignmentService. Not a user-facing
      VS Code feature area to compare parity against, so it has no matrix row.
  - stub_service: NullApiDeprecationService
    reason: >-
      A `const` no-op (api/common/extHostApiDeprecationService.ts), never
      registerSingleton'd or referenced anywhere else in the tree — the active
      IExtHostApiDeprecationService is the real ExtHostApiDeprecationService,
      wired via registerSingleton in api/common/extHost.common.services.ts.
      Ext-host API-deprecation-warning infra, not a workbench parity feature area.
  - contrib: contrib/codeEditor
    reason: >-
      Not imported by literal path in the 3 entry files, but genuinely loaded
      transitively: common/languageConfigurationExtensionPoint.ts is imported by
      api/browser/extensionHost.contribution.ts (imported by workbench.common.main.ts),
      and the browser/ files are imported directly by many already-wired contribs
      (debug, extensions, preferences, scm, search, terminalContrib/find, testing,
      webview). Matches the 'editor: done' row's summary mention of contrib/codeEditor.
  - contrib: contrib/terminalContrib
    reason: >-
      Terminal's own sub-contributions directory, not a separate feature area —
      contrib/terminal/terminal.all.ts (imported by workbench.common.main.ts) imports
      every terminalContrib/*/browser/terminal.*.contribution.js submodule directly.
  - contrib: contrib/update
    reason: >-
      Contains only an unused constant (ShowCurrentReleaseNotesActionId in
      common/update.ts); no update-checking UI was ported and nothing imports it.
      Update checking/installing is handled natively by
      apps/desktop/src/commands/updater.rs (Tauri's own updater), not this contrib.
