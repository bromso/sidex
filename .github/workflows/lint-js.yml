name: Lint JS/TS

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/lint-js.yml"
      - "src/**"
      - "tsconfig.json"
      - "biome.json"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lint-js.yml"
      - "src/**"
      - "tsconfig.json"
      - "biome.json"
      - "package.json"
      - "bun.lock"

concurrency:
  group: lint-js-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

  biome:
    name: Biome
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
