name: Tests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test.yml"
      - "crates/**"
      - "src-tauri/**"
      - "sidex-extension-sdk/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test.yml"
      - "crates/**"
      - "src-tauri/**"
      - "sidex-extension-sdk/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"

env:
  RUST_BACKTRACE: 1
  CARGO_PROFILE_DEV_DEBUG: 0

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  rust-test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: test-${{ matrix.os }}

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
